name: Tailwind Canonical Classes

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - 'src/**'
      - 'components.json'
      - 'tools/tailwind/**'
      - 'package.json'
      - 'bun.lock'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  report:
    name: Report non-canonical Tailwind classes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Run the *executable* tooling from the base ref, never the PR's copy,
      # so a PR author can't rewrite the script that runs with the
      # pull-requests:write token. The analyzed data (src/**, components.json)
      # is left at the PR version on purpose — that's what we're checking.
      - name: Restore trusted tailwind tooling from base ref
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git fetch --depth=1 origin "$BASE_SHA"
          git checkout "$BASE_SHA" -- tools/tailwind \
            || echo "Base ref lacks these scripts (introducing PR); using PR copy."

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      # --ignore-scripts: the analyzer only needs tailwindcss +
      # @tailwindcss/node resolvable from node_modules; skip the electron
      # postinstall (and any PR-introduced lifecycle scripts).
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      # The tool itself always exits 0; empty output means every class is
      # already canonical. Only verified (CSS-equivalent) findings produce
      # output — rejected suggestions alone don't. The job fails on findings
      # in a later step, after the PR comment is posted.
      - name: Generate report
        id: report
        run: |
          bun tools/tailwind/canonicalize-classes.ts --markdown \
            > "$RUNNER_TEMP/tailwind-report.md"
          if [ -s "$RUNNER_TEMP/tailwind-report.md" ]; then
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
          fi

      # Update-or-create a single marker comment so repeated pushes don't
      # stack duplicates. When findings from an earlier push are resolved,
      # the existing comment is updated to say so; a clean PR with no prior
      # comment posts nothing.
      - name: Post or update PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HAS_FINDINGS: ${{ steps.report.outputs.has_findings }}
        run: |
          marker='<!-- tailwind-canonical-report -->'

          existing_id=$(gh api \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq '[.[] | select(.body | startswith("<!-- tailwind-canonical-report -->")) | .id] | first // empty')

          if [ "$HAS_FINDINGS" = 'true' ]; then
            {
              echo "$marker"
              cat "$RUNNER_TEMP/tailwind-report.md"
            } > "$RUNNER_TEMP/tailwind-comment.md"
          elif [ -n "$existing_id" ]; then
            {
              echo "$marker"
              echo '### Non-canonical Tailwind classes'
              echo
              echo 'All classes are canonical now — previous findings resolved. ✅'
            } > "$RUNNER_TEMP/tailwind-comment.md"
          else
            echo 'No findings and no prior comment — nothing to post.'
            exit 0
          fi

          if [ -n "$existing_id" ]; then
            gh api -X PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${existing_id}" \
              -F "body=@${RUNNER_TEMP}/tailwind-comment.md"
          else
            gh pr comment "$PR_NUMBER" \
              --body-file "$RUNNER_TEMP/tailwind-comment.md"
          fi

      - name: Fail on findings
        if: steps.report.outputs.has_findings == 'true'
        run: |
          echo "Non-canonical Tailwind classes found — see the PR comment."
          echo "Fix locally: bun tools/tailwind/canonicalize-classes.ts --apply"
          exit 1

  # The report job above can only see the PR head, where a hand-applied
  # unsafe IDE suggestion (e.g. rounded-[4px] -> rounded-lg under a :root
  # --radius override) already looks canonical. This job inspects the diff
  # instead and, unlike the report, fails the check when it finds one.
  regressions:
    name: Check canonicalization regressions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Same trust model as the report job: the executable tooling comes from
      # the base ref, never the PR's copy. Fetching the base SHA here also
      # provides the tree that `git diff`/`git show` compare against.
      - name: Restore trusted tailwind tooling from base ref
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git fetch --depth=1 origin "$BASE_SHA"
          git checkout "$BASE_SHA" -- tools/tailwind \
            || echo "Base ref lacks these scripts (introducing PR); using PR copy."

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      # Exits 1 on findings; capture the status so the comment posts before
      # the job fails.
      - name: Check the diff for unsafe canonicalizations
        id: check
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set +e
          bun tools/tailwind/check-regressions.ts \
            --base "$BASE_SHA" --markdown \
            > "$RUNNER_TEMP/tailwind-regressions.md"
          echo "status=$?" >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CHECK_STATUS: ${{ steps.check.outputs.status }}
        run: |
          marker='<!-- tailwind-regression-report -->'

          existing_id=$(gh api \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq '[.[] | select(.body | startswith("<!-- tailwind-regression-report -->")) | .id] | first // empty')

          if [ "$CHECK_STATUS" != '0' ]; then
            {
              echo "$marker"
              cat "$RUNNER_TEMP/tailwind-regressions.md"
            } > "$RUNNER_TEMP/tailwind-regression-comment.md"
          elif [ -n "$existing_id" ]; then
            {
              echo "$marker"
              echo '### Unsafe Tailwind canonicalizations in this diff'
              echo
              echo 'Previous regressions are resolved. ✅'
            } > "$RUNNER_TEMP/tailwind-regression-comment.md"
          else
            echo 'No regressions and no prior comment — nothing to post.'
            exit 0
          fi

          if [ -n "$existing_id" ]; then
            gh api -X PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${existing_id}" \
              -F "body=@${RUNNER_TEMP}/tailwind-regression-comment.md"
          else
            gh pr comment "$PR_NUMBER" \
              --body-file "$RUNNER_TEMP/tailwind-regression-comment.md"
          fi

      - name: Fail on regressions
        if: steps.check.outputs.status != '0'
        run: |
          cat "$RUNNER_TEMP/tailwind-regressions.md"
          exit 1
